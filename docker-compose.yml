version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: BuscaPrecosWeb
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes

volumes:
  postgres_data: {}
